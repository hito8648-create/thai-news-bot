name: Thai News Bot Auto Post

on:
  schedule:
    - cron: '0 23,3,11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-generativeai requests python-dotenv
    - name: Run Thai News Bot
      env:
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
        THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      run: python main_bot.py
    - name: Commit change in posted history
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Auto-update posted history [skip ci]"
        file_pattern: 'posted_history.json'
