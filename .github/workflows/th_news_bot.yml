name: Thai News Bot Auto Post

on:
  schedule:
    # GitHubのアクションは、毎時00分だと混雑により1時間近く遅延することが多いため、
    # 21分などの「中途半端な時間」に設定することで動作を安定化させます。
    # 01:21 UTC = 08:21 ICT (タイ時間: 朝のニュース)
    # 05:21 UTC = 12:21 ICT (タイ時間: お昼のニュース)
    # 13:21 UTC = 20:21 ICT (タイ時間: 夜のニュース)
    - cron: '53 1,5,13 * * *'
  workflow_dispatch: # ボタン一発で手動実行したい時用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-generativeai requests python-dotenv

    - name: Run Thai News Bot
      env:
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
        THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      run: python main_bot.py

    - name: Commit change in posted history
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Auto-update posted history [skip ci]"
        file_pattern: 'posted_history.json'
