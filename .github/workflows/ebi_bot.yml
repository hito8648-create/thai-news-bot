name: Sensei Ebi Bot Auto Post (US Focus)

on:
  schedule:
    # アメリカのピークタイムに合わせた 1日3回のスケジュール (45分設定で安定化)
    # 13:45 UTC = 09:45 EST (アメリカ東海岸の朝)
    # 17:45 UTC = 12:45 EST (アメリカ東海岸の昼 / 西海岸の朝)
    # 22:45 UTC = 17:45 EST (アメリカ東海岸の夕方 / 西海岸の午後)
    - cron: '45 13,17,22 * * *'
  workflow_dispatch: # ボタン一発で手動実行したい時用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-generativeai requests python-dotenv

    - name: Run Ebi Bot
      env:
        THREADS_ACCESS_TOKEN_EBI: ${{ secrets.THREADS_ACCESS_TOKEN_EBI }}
        THREADS_USER_ID_EBI: ${{ secrets.THREADS_USER_ID_EBI }}
        GEMINI_API_KEY_EBI: ${{ secrets.GEMINI_API_KEY_EBI }}
      run: python main_bot_ebi.py
      
    - name: Commit change in word history
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Auto-update used words history (Ebi Bot) [skip ci]"
        file_pattern: 'used_words_ebi.json posted_history_ebi.json'
